<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Laboratório Camini - Sistema de Gestão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }
    :root {
      --blue: #1a6fa8;
      --blue-dark: #0d4a7a;
      --green: #1e9e5e;
      --red: #d32f2f;
      --gray-100: #f5f5f5;
      --gray-400: #999;
      --gray-600: #666;
      --gray-800: #333;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-100); color: var(--gray-800) }
    
    .header { background: var(--blue); color: white; padding: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100 }
    .header h1 { font-size: 18px; font-weight: 700 }
    .header-sub { font-size: 11px; opacity: 0.9 }
    .sync { display: flex; align-items: center; gap: 6px; font-size: 12px }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50 }

    .container { max-width: 900px; margin: 0 auto }
    .nav { display: flex; gap: 0; background: white; border-bottom: 1px solid var(--gray-100); position: sticky; bottom: 0; z-index: 99 }
    .nav-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--gray-400); font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; border-top: 3px solid transparent; transition: all 0.2s }
    .nav-btn.active { color: var(--blue); border-top-color: var(--blue); font-weight: 700 }
    .nav-btn:hover { color: var(--blue) }

    .page { display: none; padding: 20px 16px; margin-bottom: 80px }
    .page.active { display: block !important }
    .page-title { font-size: 26px; font-weight: 700; margin-bottom: 24px; color: var(--blue) }

    .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px }
    .card-title { font-size: 16px; font-weight: 700; color: var(--blue); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--gray-100) }

    .form-group { margin-bottom: 16px }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px }
    .req { color: var(--red) }
    .form-control { width: 100%; padding: 10px; border: 1px solid var(--gray-100); border-radius: var(--radius); font-size: 13px; font-family: inherit }
    .form-control:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,111,168,0.1) }
    textarea.form-control { resize: vertical; min-height: 80px }

    .btn { padding: 10px 16px; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s }
    .btn-primary { background: var(--blue); color: white }
    .btn-primary:hover { background: var(--blue-dark) }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed }
    .btn-ghost { background: var(--gray-100); color: var(--gray-800) }
    .btn-ghost:hover { background: #e0e0e0 }
    .btn-block { width: 100% }
    .btn-row { display: flex; gap: 12px; margin-top: 20px }
    .btn-row .btn { flex: 1 }

    .item-card { background: #f9f9f9; border: 1px solid var(--gray-100); border-radius: var(--radius); padding: 12px; margin-bottom: 12px }
    .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px }
    .item-title { font-weight: 700; color: var(--blue) }
    .item-actions { display: flex; gap: 6px }
    .btn-sm { padding: 6px 12px; font-size: 11px }
    .btn-remove { background: var(--red); color: white }
    .btn-remove:hover { background: #c62828 }
    .item-info { font-size: 12px; color: var(--gray-600); margin: 4px 0 }

    .list-item { background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center }
    .list-item-info { flex: 1 }
    .list-item-title { font-weight: 700; font-size: 14px; margin-bottom: 4px }
    .list-item-meta { font-size: 12px; color: var(--gray-400) }
    .list-item-actions { display: flex; gap: 6px }
    .btn-icon { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s }
    .btn-icon.edit { background: #e3f2fd; color: var(--blue) }
    .btn-icon.delete { background: #ffebee; color: var(--red) }
    .btn-icon:hover { transform: scale(1.1) }

    .empty { text-align: center; padding: 40px 20px; color: var(--gray-400) }
    .empty-icon { font-size: 48px; margin-bottom: 12px }

    .alert-box { position: fixed; top: 80px; right: 16px; z-index: 200; max-width: 300px }
    .alert { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 8px; animation: slideIn 0.3s ease-out; font-size: 12px; font-weight: 600 }
    .alert.success { background: #c8e6c9; color: #2e7d32 }
    .alert.warning { background: #fff3cd; color: #856404 }
    .alert.danger { background: #f8d7da; color: #721c24 }
    @keyframes slideIn { from { transform: translateX(400px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }

    .resumo { background: var(--green); color: white; padding: 16px; border-radius: var(--radius); margin: 16px 0 }
    .resumo-total { font-size: 24px; font-weight: 700; margin-bottom: 8px }
    .resumo-info { font-size: 12px; opacity: 0.9 }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🦷 Camini</h1>
    <div class="header-sub">Laboratório de Prótese Dentária</div>
  </div>
  <div class="sync">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Online</span>
  </div>
</div>

<div class="alert-box" id="alertBox"></div>

<div class="container">

<!-- PÁGINA: SERVIÇOS -->
<div class="page active" id="page-servicos">
  <div class="page-title">📋 Serviços</div>
  <button class="btn btn-primary btn-block" onclick="novoServico()">➕ Novo Serviço</button>
  <div id="lista-servicos" style="margin-top: 16px">
    <div class="empty"><div class="empty-icon">🔧</div><p>Carregando...</p></div>
  </div>
</div>

<!-- PÁGINA: FORMULÁRIO -->
<div class="page" id="page-form">
  <button class="btn btn-ghost" onclick="voltarServicos()" style="margin-bottom: 16px">← Voltar</button>
  
  <div class="page-title" id="form-titulo">Novo Serviço</div>
  <input type="hidden" id="form-id">
  
  <div class="card">
    <div class="card-title">📋 Dados Principais</div>
    
    <div class="form-group">
      <label class="form-label">Cliente (Consultório) <span class="req">*</span></label>
      <select class="form-control" id="form-cliente"></select>
    </div>
    
    <div class="form-group">
      <label class="form-label">Paciente <span class="req">*</span></label>
      <input type="text" class="form-control" id="form-paciente" placeholder="Nome do paciente">
    </div>
    
    <div class="form-group">
      <label class="form-label">Data de Entrada <span class="req">*</span></label>
      <input type="date" class="form-control" id="form-entrada">
    </div>
  </div>

  <div class="card" style="background: #e3f2fd; border: 2px solid var(--blue)">
    <div class="card-title" style="color: var(--blue); border-bottom-color: var(--blue)">➕ Adicionar Serviço (Item)</div>
    
    <div class="form-group">
      <label class="form-label">Tipo de Serviço <span class="req">*</span></label>
      <select class="form-control" id="form-tipo"></select>
    </div>
    
    <div class="form-group">
      <label class="form-label">Valor (R$) <span class="req">*</span></label>
      <input type="number" class="form-control" id="form-valor" placeholder="0,00" step="0.01" min="0">
    </div>
    
    <div class="form-group">
      <label class="form-label">Descrição (opcional)</label>
      <textarea class="form-control" id="form-desc" placeholder="Ex: Cor 16, anotações..."></textarea>
    </div>
    
    <button class="btn btn-primary btn-block" onclick="adicionarItem()">➕ Adicionar Item</button>
  </div>

  <div class="card">
    <div class="card-title">📦 Itens Adicionados</div>
    <div id="form-items"></div>
  </div>

  <div class="resumo">
    <div class="resumo-total" id="form-total">Total: R$ 0,00</div>
    <div class="resumo-info">
      <div id="form-qtd">0 itens</div>
      <div id="form-saida">Saída: —</div>
    </div>
  </div>

  <input type="hidden" id="form-saida-data">
  <input type="hidden" id="form-itens-json" value="[]">

  <div class="btn-row">
    <button class="btn btn-ghost" onclick="voltarServicos()">Cancelar</button>
    <button class="btn btn-primary" id="btn-salvar" onclick="salvarServico()">💾 Salvar Serviço</button>
  </div>
</div>

</div>

<div class="nav">
  <button class="nav-btn active" onclick="irPara('servicos')">
    <span>📋</span><span>Serviços</span>
  </button>
</div>

<script>
const URL_SB = 'https://riojhleayqxvoslcjjfx.supabase.co'
const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpb2pobGVheXF4dm9zbGNqamZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDU1OTgsImV4cCI6MjA5MDM4MTU5OH0.6x6xXra7051CgF72QwudpEGc_pktBws5nJCp740OAu0'

let clientes = [], servicos = [], tipos = [], itens = [], editandoId = null

// ── NAVEGAÇÃO ──
function irPara(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'))
  document.getElementById('page-' + p).classList.add('active')
}

function alerta(msg, tipo = 'success') {
  const el = document.createElement('div')
  el.className = `alert ${tipo}`
  el.textContent = msg
  document.getElementById('alertBox').appendChild(el)
  setTimeout(() => el.remove(), 3000)
}

// ── API ──
async function api(m, t, d = null, p = '') {
  try {
    const r = await fetch(`${URL_SB}/rest/v1/${t}${p}`, {
      method: m,
      headers: { 'Content-Type': 'application/json', 'apikey': KEY_SB, 'Authorization': `Bearer ${KEY_SB}` },
      body: d ? JSON.stringify(d) : undefined
    })
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${(await r.json()).message}`)
    return r.status === 204 ? [] : await r.json()
  } catch(e) { console.error('API Error:', e); throw e }
}

// ── CARREGAR ──
async function carregar() {
  try {
    document.getElementById('syncDot').style.background = '#ff9800'
    clientes = await api('GET', 'clientes', null, '?select=*')
    servicos = await api('GET', 'servicos', null, '?select=*')
    tipos = await api('GET', 'tipos_servico', null, '?select=*')
    
    document.getElementById('syncDot').style.background = '#4caf50'
    document.getElementById('syncText').textContent = 'Online'
    
    renderizar()
  } catch(e) {
    document.getElementById('syncDot').style.background = '#f44336'
    document.getElementById('syncText').textContent = 'Erro'
    alerta('❌ Erro: ' + e.message, 'danger')
  }
}

function renderizar() {
  // RENDERIZAR LISTA DE SERVIÇOS
  const el = document.getElementById('lista-servicos')
  if (!servicos.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔧</div><p>Nenhum serviço</p></div>'
    return
  }
  
  el.innerHTML = servicos.map(s => {
    const cli = clientes.find(c => c.id === s.cliente_id)
    const numCli = cli?.numero_sequencial || '—'
    const nomeCli = s.cliente_nome || cli?.nome_dentista || cli?.nome_lab || 'Cliente'
    const qtd = s.quantidade_itens || 0
    const total = (s.valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
    const status = s.pago ? '✓ Pago' : '⏳ Pendente'
    
    return `<div class="list-item">
      <div class="list-item-info">
        <div class="list-item-title">#${numCli} ${nomeCli}</div>
        <div class="list-item-meta">👤 ${s.paciente || '—'}</div>
        <div class="list-item-meta">📦 ${qtd} item${qtd !== 1 ? 's' : ''} · ${total} · ${status}</div>
      </div>
      <div class="list-item-actions">
        <button class="btn-icon edit" onclick="editarServico(${s.id})">✏️</button>
        <button class="btn-icon" style="background: #c8e6c9; color: var(--green)" onclick="compartilharWhatsApp(${s.id})">💬</button>
        <button class="btn-icon" style="background: #e3f2fd; color: var(--blue)" onclick="imprimirServico(${s.id})">🖨️</button>
      </div>
    </div>`
  }).join('')
  
  // POPULAR SELECTS
  document.getElementById('form-cliente').innerHTML = '<option value="">— Selecione —</option>' + 
    clientes.map(c => `<option value="${c.id}">${c.numero_sequencial || '?'} - ${c.nome_dentista || c.nome_lab}</option>`).join('')
  
  document.getElementById('form-tipo').innerHTML = '<option value="">— Selecione —</option>' + 
    tipos.map(t => `<option value="${t.nome}">${t.nome}</option>`).join('')
}

// ── NOVO/EDITAR ──
function novoServico() {
  editandoId = null
  document.getElementById('form-id').value = ''
  document.getElementById('form-cliente').value = ''
  document.getElementById('form-paciente').value = ''
  document.getElementById('form-entrada').value = new Date().toISOString().split('T')[0]
  document.getElementById('form-tipo').value = ''
  document.getElementById('form-valor').value = ''
  document.getElementById('form-desc').value = ''
  document.getElementById('form-saida-data').value = ''
  document.getElementById('form-itens-json').value = '[]'
  itens = []
  
  document.getElementById('form-titulo').textContent = '➕ Novo Serviço'
  renderizarItens()
  irPara('form')
}

function editarServico(id) {
  const s = servicos.find(x => x.id === id)
  if (!s) return
  
  editandoId = id
  document.getElementById('form-id').value = id
  document.getElementById('form-cliente').value = s.cliente_id
  document.getElementById('form-paciente').value = s.paciente || ''
  document.getElementById('form-entrada').value = s.data_entrada
  document.getElementById('form-saida-data').value = s.data_saida || ''
  
  try {
    itens = s.itens_json ? JSON.parse(s.itens_json) : []
  } catch(e) {
    itens = []
  }
  
  document.getElementById('form-itens-json').value = JSON.stringify(itens)
  document.getElementById('form-titulo').textContent = '✏️ Editar Serviço'
  renderizarItens()
  irPara('form')
}

function voltarServicos() {
  irPara('servicos')
}

// ── ITENS ──
function adicionarItem() {
  const tipo = document.getElementById('form-tipo').value.trim()
  const valor = parseFloat(document.getElementById('form-valor').value)
  const desc = document.getElementById('form-desc').value.trim()
  
  if (!tipo) { alerta('Selecione tipo', 'warning'); return }
  if (isNaN(valor) || valor <= 0) { alerta('Valor inválido', 'warning'); return }
  
  itens.push({ id: Date.now(), tipo, valor, desc })
  
  document.getElementById('form-tipo').value = ''
  document.getElementById('form-valor').value = ''
  document.getElementById('form-desc').value = ''
  document.getElementById('form-itens-json').value = JSON.stringify(itens)
  
  renderizarItens()
  alerta('✅ Item adicionado', 'success')
}

function removerItem(id) {
  itens = itens.filter(i => i.id !== id)
  document.getElementById('form-itens-json').value = JSON.stringify(itens)
  renderizarItens()
}

function editarItem(id) {
  const item = itens.find(i => i.id === id)
  if (!item) return
  
  const novoTipo = prompt('Tipo:', item.tipo)
  if (!novoTipo) return
  
  const novoValor = parseFloat(prompt('Valor:', item.valor))
  if (isNaN(novoValor)) return
  
  const novoDesc = prompt('Descrição:', item.desc)
  
  item.tipo = novoTipo
  item.valor = novoValor
  item.desc = novoDesc
  
  document.getElementById('form-itens-json').value = JSON.stringify(itens)
  renderizarItens()
  alerta('✅ Item atualizado', 'success')
}

function renderizarItens() {
  const el = document.getElementById('form-items')
  
  if (!itens.length) {
    el.innerHTML = '<div class="empty"><p>Nenhum item</p></div>'
  } else {
    el.innerHTML = itens.map(item => `
      <div class="item-card">
        <div class="item-header">
          <div class="item-title">${item.tipo}</div>
          <div class="item-actions">
            <button class="btn btn-primary btn-sm" onclick="editarItem(${item.id})">Editar</button>
            <button class="btn btn-remove btn-sm" onclick="removerItem(${item.id})">❌</button>
          </div>
        </div>
        <div class="item-info">R$ ${item.valor.toFixed(2)}</div>
        ${item.desc ? `<div class="item-info">${item.desc}</div>` : ''}
      </div>
    `).join('')
  }
  
  const total = itens.reduce((s, i) => s + i.valor, 0)
  const qtd = itens.length
  
  document.getElementById('form-total').textContent = `Total: R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
  document.getElementById('form-qtd').textContent = `${qtd} item${qtd !== 1 ? 's' : ''}`
  
  // Calcular saída (5 dias úteis)
  if (qtd > 0) {
    const entrada = document.getElementById('form-entrada').value
    if (entrada) {
      let d = new Date(entrada + 'T12:00:00')
      let dias = 0
      while (dias < 5) {
        d.setDate(d.getDate() + 1)
        if (d.getDay() !== 0 && d.getDay() !== 6) dias++
      }
      const saida = d.toISOString().split('T')[0]
      document.getElementById('form-saida-data').value = saida
      document.getElementById('form-saida').textContent = `Saída: ${new Date(saida + 'T12:00:00').toLocaleDateString('pt-BR')}`
    }
  }
}

// ── SALVAR ──
async function salvarServico() {
  const cliId = document.getElementById('form-cliente').value
  const paciente = document.getElementById('form-paciente').value.trim()
  const entrada = document.getElementById('form-entrada').value
  const saida = document.getElementById('form-saida-data').value
  
  if (!cliId) { alerta('Selecione cliente', 'warning'); return }
  if (!paciente) { alerta('Informe paciente', 'warning'); return }
  if (!itens.length) { alerta('Adicione itens', 'warning'); return }
  if (!entrada) { alerta('Informe data', 'warning'); return }
  
  const cli = clientes.find(c => c.id == cliId)
  const total = itens.reduce((s, i) => s + i.valor, 0)
  const tipos_str = itens.map(i => i.tipo).join(' + ')
  
  const dados = {
    cliente_id: parseInt(cliId),
    cliente_nome: cli.nome_dentista || cli.nome_lab,
    paciente: paciente,
    tipo_servico: tipos_str,
    valor: total,
    data_entrada: entrada,
    data_saida: saida || null,
    descricao: itens.length + ' item(s)',
    itens_json: JSON.stringify(itens),
    quantidade_itens: itens.length
  }
  
  document.getElementById('btn-salvar').disabled = true
  
  try {
    if (editandoId) {
      await api('PATCH', 'servicos', dados, `?id=eq.${editandoId}`)
      alerta('✅ Serviço atualizado!', 'success')
    } else {
      dados.status = 'pendente'
      dados.pago = false
      await api('POST', 'servicos', dados)
      alerta('✅ Serviço criado!', 'success')
    }
    voltarServicos()
    await carregar()
  } catch(e) {
    alerta('❌ Erro: ' + e.message, 'danger')
  } finally {
    document.getElementById('btn-salvar').disabled = false
  }
}

// ── EXPORTAR ──
function compartilharWhatsApp(id) {
  const s = servicos.find(x => x.id === id)
  if (!s) return
  
  const cli = clientes.find(c => c.id === s.cliente_id)
  const numCli = cli?.numero_sequencial || '—'
  const nomeCli = s.cliente_nome || cli?.nome_dentista || cli?.nome_lab || 'Cliente'
  const total = (s.valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
  const dEnt = s.data_entrada ? new Date(s.data_entrada + 'T12:00:00').toLocaleDateString('pt-BR') : '—'
  const dSai = s.data_saida ? new Date(s.data_saida + 'T12:00:00').toLocaleDateString('pt-BR') : '—'
  
  let itensText = ''
  try {
    const itensArr = s.itens_json ? JSON.parse(s.itens_json) : []
    itensText = itensArr.map((it, i) => {
      let txt = `  ${i+1}. ${it.tipo} - R$ ${it.valor.toFixed(2)}`
      if (it.desc) txt += ` (${it.desc})`
      return txt
    }).join('\n')
  } catch(e) {
    itensText = s.tipo_servico || ''
  }
  
  const msg = `*SERVIÇO - LABORATÓRIO CAMINI*\n\n` +
    `🔢 Cliente #${numCli}\n` +
    `👤 Consultório: ${nomeCli}\n` +
    `🧑 Paciente: ${s.paciente}\n` +
    `📋 Serviços:\n${itensText}\n` +
    `💰 TOTAL: ${total}\n` +
    `📅 Entrada: ${dEnt}\n` +
    `📅 Saída: ${dSai}\n` +
    `✓ Status: ${s.pago ? 'Pago' : 'Pendente'}\n\n` +
    `Laboratório de Prótese Dentária Camini`
  
  window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank')
}

function imprimirServico(id) {
  const s = servicos.find(x => x.id === id)
  if (!s) return
  
  const cli = clientes.find(c => c.id === s.cliente_id)
  const numCli = cli?.numero_sequencial || '—'
  const nomeCli = s.cliente_nome || cli?.nome_dentista || cli?.nome_lab || 'Cliente'
  const total = (s.valor || 0).toFixed(2)
  const dEnt = s.data_entrada ? new Date(s.data_entrada + 'T12:00:00').toLocaleDateString('pt-BR') : '—'
  const dSai = s.data_saida ? new Date(s.data_saida + 'T12:00:00').toLocaleDateString('pt-BR') : '—'
  
  let itensHTML = ''
  try {
    const itensArr = s.itens_json ? JSON.parse(s.itens_json) : []
    itensHTML = itensArr.map((it, i) => `
      <tr style="border-bottom: 1px solid #ddd">
        <td style="padding: 10px">${i+1}. ${it.tipo}</td>
        <td style="padding: 10px; text-align: right">R$ ${it.valor.toFixed(2)}</td>
        <td style="padding: 10px; font-size: 11px; color: #666">${it.desc || ''}</td>
      </tr>
    `).join('')
  } catch(e) {
    itensHTML = `<tr><td colspan="3" style="padding: 10px">${s.tipo_servico}</td></tr>`
  }
  
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    body { font-family: Arial, sans-serif; margin: 20px; color: #333 }
    h2 { text-align: center; color: #1a6fa8; border-bottom: 3px solid #1a6fa8; padding-bottom: 10px }
    table { width: 100%; border-collapse: collapse; margin-top: 20px }
    th { background: #f5f5f5; padding: 10px; text-align: left; font-weight: bold; border-bottom: 2px solid #ccc }
    td { padding: 10px; border-bottom: 1px solid #eee }
    .total { font-weight: bold; text-align: right; background: #f5f5f5 }
  </style></head><body>
    <h2>Laboratório Camini - Serviço</h2>
    <table>
      <tr><th>Cliente</th><th colspan="2">#${numCli} - ${nomeCli}</th></tr>
      <tr><th>Paciente</th><th colspan="2">${s.paciente}</th></tr>
      <tr><th colspan="3">Serviços</th></tr>
      ${itensHTML}
      <tr class="total"><td colspan="2">TOTAL:</td><td style="text-align: right">R$ ${total}</td></tr>
      <tr><th>Entrada</th><th colspan="2">${dEnt}</th></tr>
      <tr><th>Saída Prevista</th><th colspan="2">${dSai}</th></tr>
      <tr><th>Status</th><th colspan="2">${s.pago ? 'Pago' : 'Pendente'}</th></tr>
    </table>
    <p style="text-align: center; margin-top: 30px; color: #999; font-size: 12px">
      Gerado em: ${new Date().toLocaleString('pt-BR')}<br>
      Laboratório de Prótese Dentária Camini
    </p>
  </body></html>`
  
  const win = window.open('', '', 'width=800,height=600')
  win.document.write(html)
  win.document.close()
  setTimeout(() => win.print(), 500)
}

// ── INICIAR ──
window.addEventListener('DOMContentLoaded', carregar)
</script>

</body>
</html>
