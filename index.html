<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Laboratório Camini - Sistema de Gestão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }
    :root {
      --blue: #1a6fa8;
      --blue-light: #e3f2fd;
      --green: #1e9e5e;
      --green-light: #e8f5e9;
      --red: #d32f2f;
      --gray-100: #f5f5f5;
      --gray-400: #999;
      --gray-600: #666;
      --gray-800: #333;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --radius: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
    }
    .header {
      background: var(--blue);
      color: white;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
    }
    .header h1 { font-size: 18px; font-weight: 700 }
    .header-sub { font-size: 12px; opacity: 0.9 }
    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: var(--radius);
    }
    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }
    .sync-dot.loading { background: #ff9800; animation: pulse 1s infinite }
    .sync-dot.error { background: #f44336 }
    @keyframes pulse { 50% { opacity: 0.5 } }

    .container { max-width: 800px; margin: 0 auto }
    
    .nav {
      display: flex;
      gap: 0;
      background: white;
      border-bottom: 1px solid var(--gray-100);
      position: sticky;
      bottom: 0;
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      color: var(--gray-600);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border-top: 3px solid transparent;
    }
    .nav-btn.active {
      color: var(--blue);
      border-top-color: var(--blue);
      font-weight: 700;
    }

    .page { display: none; padding: 20px 16px; margin-bottom: 80px }
    .page.active { display: block }
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 20px }

    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--gray-100);
    }

    .form-group { margin-bottom: 16px }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 6px;
    }
    .req { color: var(--red) }
    .form-control {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--gray-100);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 111, 168, 0.1);
    }
    textarea.form-control { resize: vertical; min-height: 80px }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--blue);
      color: white;
    }
    .btn-primary:hover { background: #0d4a7a }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed }
    .btn-ghost {
      background: var(--gray-100);
      color: var(--gray-800);
    }
    .btn-ghost:hover { background: #e0e0e0 }
    .btn-block { width: 100% }
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .btn-row .btn { flex: 1 }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: var(--gray-100);
      border-radius: var(--radius);
      margin-bottom: 8px;
    }
    .item-info { flex: 1 }
    .item-name { font-weight: 700; color: var(--gray-800); font-size: 14px }
    .item-valor { font-size: 12px; color: var(--gray-400); margin-top: 2px }
    .item-desc { font-size: 11px; color: var(--gray-600); margin-top: 2px }
    .btn-remove { background: var(--red); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px }
    .btn-remove:hover { background: #c62828 }

    .resumo {
      background: var(--green-light);
      border: 2px solid var(--green);
      border-radius: var(--radius);
      padding: 16px;
      margin: 16px 0;
    }
    .resumo-title { font-size: 12px; color: var(--gray-400); font-weight: 700; margin-bottom: 8px }
    .resumo-total { font-size: 24px; font-weight: 800; color: var(--green); margin-bottom: 8px }
    .resumo-info { font-size: 12px; color: var(--gray-600) }

    .alerta-box { position: fixed; top: 80px; right: 16px; z-index: 1000 }
    .alerta {
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 8px;
      animation: slideIn 0.3s ease-out;
      font-size: 13px;
      font-weight: 600;
    }
    .alerta.success { background: #c8e6c9; color: #2e7d32 }
    .alerta.warning { background: #fff3cd; color: #856404 }
    .alerta.danger { background: #f8d7da; color: #721c24 }
    @keyframes slideIn { from { transform: translateX(400px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }

    .list-item {
      background: white;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .list-item-info { flex: 1 }
    .list-item-title { font-weight: 700; color: var(--gray-800); font-size: 14px; margin-bottom: 4px }
    .list-item-meta { font-size: 12px; color: var(--gray-400) }
    .list-item-actions { display: flex; gap: 8px }
    .btn-icon {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    .btn-icon.edit { background: var(--blue-light); color: var(--blue) }
    .btn-icon.delete { background: #ffebee; color: var(--red) }
    .btn-icon:hover { transform: scale(1.1) }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-400);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px }
    .empty p { font-size: 14px }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <h1>🦷 Camini</h1>
    <div class="header-sub">LABORATÓRIO DE PRÓTESE DENTÁRIA</div>
  </div>
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Online</span>
  </div>
</div>

<!-- ALERT BOX -->
<div class="alerta-box" id="alertBox"></div>

<!-- PÁGINAS -->

<!-- PÁGINA: SERVIÇOS -->
<div class="page active" id="page-servicos">
  <div class="page-title">📋 Serviços</div>
  
  <button class="btn btn-primary btn-block" onclick="novoServico()">➕ Novo Serviço</button>
  
  <div id="lista-servicos" style="margin-top: 16px;">
    <div class="empty">
      <div class="empty-icon">🔧</div>
      <p>Carregando serviços...</p>
    </div>
  </div>
</div>

<!-- PÁGINA: FORMULÁRIO DE SERVIÇO -->
<div class="page" id="page-form-servico">
  <button class="btn btn-ghost" onclick="voltarServicos()" style="margin-bottom: 16px;">← Voltar</button>
  
  <div class="page-title" id="form-titulo">Novo Serviço</div>
  <input type="hidden" id="form-srv-id">
  
  <!-- DADOS BÁSICOS -->
  <div class="card">
    <div class="card-title">📋 Dados do Serviço</div>
    
    <div class="form-group">
      <label class="form-label">Consultório (Cliente) <span class="req">*</span></label>
      <select class="form-control" id="form-cliente"></select>
    </div>
    
    <div class="form-group">
      <label class="form-label">Paciente <span class="req">*</span></label>
      <input type="text" class="form-control" id="form-paciente" placeholder="Nome do paciente">
    </div>
    
    <div class="form-group">
      <label class="form-label">Data de Entrada <span class="req">*</span></label>
      <input type="date" class="form-control" id="form-entrada">
    </div>
  </div>

  <!-- ADICIONAR ITENS -->
  <div class="card" style="background: var(--blue-light); border: 2px solid var(--blue);">
    <div class="card-title" style="color: var(--blue); border-bottom-color: var(--blue);">➕ Adicionar Serviços</div>
    
    <div class="form-group">
      <label class="form-label">Tipo de Serviço <span class="req">*</span></label>
      <select class="form-control" id="form-tipo"></select>
    </div>
    
    <div class="form-group">
      <label class="form-label">Valor (R$) <span class="req">*</span></label>
      <input type="number" class="form-control" id="form-valor" placeholder="0,00" step="0.01" min="0">
    </div>
    
    <div class="form-group">
      <label class="form-label">Descrição (opcional)</label>
      <textarea class="form-control" id="form-desc" placeholder="Ex: Cor 16, anotações importantes..."></textarea>
    </div>
    
    <button class="btn btn-primary btn-block" onclick="adicionarItem()">➕ Adicionar</button>
  </div>

  <!-- ITENS ADICIONADOS -->
  <div class="card">
    <div class="card-title">📋 Itens</div>
    <div id="form-items-list">
      <div class="empty">
        <p>Nenhum item adicionado</p>
      </div>
    </div>
  </div>

  <!-- RESUMO -->
  <div class="resumo">
    <div class="resumo-title">RESUMO DO SERVIÇO</div>
    <div class="resumo-total" id="form-total">Total: R$ 0,00</div>
    <div class="resumo-info">
      <div id="form-qtd-items">0 itens</div>
      <div id="form-saida-info">Saída: —</div>
    </div>
  </div>

  <input type="hidden" id="form-saida">
  <input type="hidden" id="form-itens-json" value="[]">

  <!-- BOTÕES -->
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="voltarServicos()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarServico()">💾 Salvar Serviço</button>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="irPara('servicos')">
    <span style="font-size:20px">🏠</span>
    <span>Serviços</span>
  </button>
</div>

<!-- SCRIPT -->
<script>
const URL_SB = 'https://riojhleayqxvoslcjjfx.supabase.co'
const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpb2pobGVheXF4dm9zbGNqamZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDU1OTgsImV4cCI6MjA5MDM4MTU5OH0.6x6xXra7051CgF72QwudpEGc_pktBws5nJCp740OAu0'

let clientes = []
let servicos = []
let tipos = []
let conectado = false
let servicoEmEdicao = null
let itensTemp = []

// ── NAV ──
function irPara(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'))
  const page = document.getElementById('page-' + p)
  if (page) page.classList.add('active')
}

// ── API ──
async function api(metodo, tabela, dados = null, params = '') {
  try {
    const url = `${URL_SB}/rest/v1/${tabela}${params}`
    console.log(`📡 ${metodo} ${tabela}`)
    
    const resp = await fetch(url, {
      method: metodo,
      headers: {
        'Content-Type': 'application/json',
        'apikey': KEY_SB,
        'Authorization': `Bearer ${KEY_SB}`,
        'Prefer': metodo === 'POST' ? 'return=representation' : ''
      },
      body: dados ? JSON.stringify(dados) : undefined
    })

    if (!resp.ok) {
      const erro = await resp.json()
      throw new Error(erro.message || `Erro ${resp.status}`)
    }

    return resp.status === 204 ? [] : await resp.json()
  } catch(e) {
    console.error('❌ Erro API:', e.message)
    throw e
  }
}

// ── SINCRONIZAR ──
function setSync(s) {
  const dot = document.getElementById('syncDot')
  const txt = document.getElementById('syncText')
  if (s === 'ok') {
    dot.style.background = '#4caf50'
    dot.style.animation = 'none'
    txt.textContent = 'Online'
    conectado = true
  } else if (s === 'loading') {
    dot.style.background = '#ff9800'
    dot.style.animation = 'pulse 1s infinite'
    txt.textContent = 'Sincronizando...'
  } else {
    dot.style.background = '#f44336'
    dot.style.animation = 'none'
    txt.textContent = 'Erro'
    conectado = false
  }
}

function alerta(msg, tipo = 'success') {
  const box = document.getElementById('alertBox')
  const el = document.createElement('div')
  el.className = `alerta ${tipo}`
  el.textContent = msg
  box.appendChild(el)
  setTimeout(() => {
    el.style.opacity = '0'
    setTimeout(() => el.remove(), 300)
  }, 3000)
}

// ── CARREGAR ──
async function carregar() {
  setSync('loading')
  try {
    clientes = await api('GET', 'clientes', null, '?select=*&order=numero_sequencial.asc')
    servicos = await api('GET', 'servicos', null, '?select=*&order=id.desc')
    tipos = await api('GET', 'tipos_servico', null, '?select=*&order=nome.asc')
    
    console.log('✅ Dados carregados:', { clientes: clientes.length, servicos: servicos.length, tipos: tipos.length })
    
    renderizar()
    setSync('ok')
  } catch(e) {
    setSync('error')
    alerta('❌ Erro: ' + e.message, 'danger')
  }
}

function renderizar() {
  renderizarServiços()
  popularSelects()
}

function renderizarServiços() {
  const el = document.getElementById('lista-servicos')
  
  if (!servicos.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔧</div><p>Nenhum serviço cadastrado</p></div>'
    return
  }

  el.innerHTML = servicos.map(s => {
    const cli = clientes.find(c => c.id === s.cliente_id)
    const nomeCli = s.cliente_nome || cli?.nome_dentista || cli?.nome_lab || 'Cliente'
    const numCli = cli?.numero_sequencial || '—'
    const total = (s.valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
    const qtdItems = s.quantidade_itens || 0
    const status = s.pago ? '✓ Pago' : '⏳ Pendente'
    
    return `<div class="list-item">
      <div class="list-item-info">
        <div class="list-item-title">#${numCli} ${nomeCli}</div>
        <div class="list-item-meta">👤 ${s.paciente || '—'}</div>
        <div class="list-item-meta">📦 ${qtdItems} item${qtdItems !== 1 ? 's' : ''} · ${total}</div>
        <div class="list-item-meta">${status}</div>
      </div>
      <div class="list-item-actions">
        <button class="btn-icon edit" onclick="editarServico(${s.id})">✏️</button>
        <button class="btn-icon" style="background: var(--green-light); color: var(--green)" onclick="exportarWhatsApp(${s.id})">💬</button>
        <button class="btn-icon" style="background: var(--blue-light); color: var(--blue)" onclick="imprimirServico(${s.id})">🖨️</button>
      </div>
    </div>`
  }).join('')
}

function popularSelects() {
  const selCli = document.getElementById('form-cliente')
  selCli.innerHTML = '<option value="">— Selecione o consultório —</option>'
  clientes.forEach(c => {
    const nome = c.tipo_cliente === 'Dentista' ? c.nome_dentista : c.nome_lab
    const seq = c.numero_sequencial ? ` [${c.numero_sequencial}]` : ''
    selCli.innerHTML += `<option value="${c.id}">${nome}${seq}</option>`
  })

  const selTipo = document.getElementById('form-tipo')
  selTipo.innerHTML = '<option value="">— Selecione o tipo —</option>'
  tipos.forEach(t => {
    selTipo.innerHTML += `<option value="${t.nome}">${t.nome}</option>`
  })
}

// ── NOVO/EDITAR SERVIÇO ──
function novoServico() {
  servicoEmEdicao = null
  document.getElementById('form-srv-id').value = ''
  document.getElementById('form-cliente').value = ''
  document.getElementById('form-paciente').value = ''
  document.getElementById('form-entrada').value = new Date().toISOString().split('T')[0]
  document.getElementById('form-tipo').value = ''
  document.getElementById('form-valor').value = ''
  document.getElementById('form-desc').value = ''
  document.getElementById('form-saida').value = ''
  document.getElementById('form-itens-json').value = '[]'
  itensTemp = []
  
  document.getElementById('form-titulo').textContent = '➕ Novo Serviço'
  
  renderizarItens()
  irPara('form-servico')
  window.scrollTo(0, 0)
}

function editarServico(id) {
  servicoEmEdicao = servicos.find(s => s.id === id)
  if (!servicoEmEdicao) return

  document.getElementById('form-srv-id').value = id
  document.getElementById('form-cliente').value = servicoEmEdicao.cliente_id
  document.getElementById('form-paciente').value = servicoEmEdicao.paciente || ''
  document.getElementById('form-entrada').value = servicoEmEdicao.data_entrada
  document.getElementById('form-saida').value = servicoEmEdicao.data_saida || ''
  
  // Carregar itens
  try {
    itensTemp = servicoEmEdicao.itens_json ? JSON.parse(servicoEmEdicao.itens_json) : []
  } catch(e) {
    itensTemp = []
  }
  
  document.getElementById('form-itens-json').value = JSON.stringify(itensTemp)
  document.getElementById('form-titulo').textContent = '✏️ Editar Serviço'
  
  renderizarItens()
  irPara('form-servico')
  window.scrollTo(0, 0)
}

function voltarServicos() {
  irPara('servicos')
  window.scrollTo(0, 0)
}

// ── ITENS ──
function adicionarItem() {
  const tipo = document.getElementById('form-tipo').value.trim()
  const valor = parseFloat(document.getElementById('form-valor').value)
  const desc = document.getElementById('form-desc').value.trim()

  if (!tipo) { alerta('Selecione o tipo de serviço', 'warning'); return }
  if (isNaN(valor) || valor <= 0) { alerta('Informe um valor válido', 'warning'); return }

  itensTemp.push({
    id: Date.now(),
    tipo: tipo,
    valor: valor,
    desc: desc
  })

  document.getElementById('form-tipo').value = ''
  document.getElementById('form-valor').value = ''
  document.getElementById('form-desc').value = ''
  document.getElementById('form-itens-json').value = JSON.stringify(itensTemp)
  
  renderizarItens()
  alerta('✅ Item adicionado!', 'success')
}

function removerItem(id) {
  itensTemp = itensTemp.filter(i => i.id !== id)
  document.getElementById('form-itens-json').value = JSON.stringify(itensTemp)
  renderizarItens()
}

function renderizarItens() {
  const el = document.getElementById('form-items-list')
  
  if (!itensTemp.length) {
    el.innerHTML = '<div class="empty"><p>Nenhum item adicionado</p></div>'
  } else {
    el.innerHTML = itensTemp.map(item => `
      <div class="item-row">
        <div class="item-info">
          <div class="item-name">${item.tipo}</div>
          <div class="item-valor">R$ ${item.valor.toFixed(2).replace('.', ',')}</div>
          ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
        </div>
        <button class="btn-remove" onclick="removerItem(${item.id})">❌ Remover</button>
      </div>
    `).join('')
  }

  // Atualizar resumo
  const total = itensTemp.reduce((sum, i) => sum + i.valor, 0)
  const qtd = itensTemp.length
  
  document.getElementById('form-total').textContent = `Total: R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
  document.getElementById('form-qtd-items').textContent = `${qtd} item${qtd !== 1 ? 's' : ''}`
  
  // Calcular saída
  if (qtd > 0) {
    const entrada = document.getElementById('form-entrada').value
    if (entrada) {
      let d = new Date(entrada + 'T12:00:00')
      let dias = 0
      while (dias < 5) {
        d.setDate(d.getDate() + 1)
        if (d.getDay() !== 0 && d.getDay() !== 6) dias++
      }
      const dataSaida = d.toISOString().split('T')[0]
      document.getElementById('form-saida').value = dataSaida
      const saidaDisplay = new Date(dataSaida + 'T12:00:00').toLocaleDateString('pt-BR')
      document.getElementById('form-saida-info').textContent = `Saída: ${saidaDisplay}`
    }
  }
}

// ── SALVAR ──
async function salvarServico() {
  if (!conectado) { alerta('Sem conexão', 'danger'); return }

  const cliId = document.getElementById('form-cliente').value
  const paciente = document.getElementById('form-paciente').value.trim()
  const entrada = document.getElementById('form-entrada').value
  const saida = document.getElementById('form-saida').value

  if (!cliId) { alerta('Selecione o consultório', 'warning'); return }
  if (!paciente) { alerta('Informe o nome do paciente', 'warning'); return }
  if (!itensTemp.length) { alerta('Adicione pelo menos um item', 'warning'); return }
  if (!entrada) { alerta('Informe a data de entrada', 'warning'); return }

  const cli = clientes.find(c => c.id == cliId)
  const total = itensTemp.reduce((sum, i) => sum + i.valor, 0)
  const tipos_str = itensTemp.map(i => i.tipo).join(' + ')

  const dados = {
    cliente_id: parseInt(cliId),
    cliente_nome: cli.nome_dentista || cli.nome_lab,
    paciente: paciente,
    tipo_servico: tipos_str,
    valor: total,
    data_entrada: entrada,
    data_saida: saida || null,
    descricao: itensTemp.length + ' item(s) - ' + itensTemp.map(i => i.tipo).join(', '),
    itens_json: JSON.stringify(itensTemp),
    quantidade_itens: itensTemp.length
  }

  try {
    if (servicoEmEdicao) {
      await api('PATCH', 'servicos', dados, `?id=eq.${servicoEmEdicao.id}`)
      alerta('✅ Serviço atualizado!', 'success')
    } else {
      dados.status = 'pendente'
      dados.pago = false
      await api('POST', 'servicos', dados)
      alerta('✅ Serviço criado!', 'success')
    }
    voltarServicos()
    await carregar()
  } catch(e) {
    alerta('❌ Erro: ' + e.message, 'danger')
  }
}

// ── EXPORTAR ──
function exportarWhatsApp(id) {
  const s = servicos.find(srv => srv.id === id)
  if (!s) return

  const cli = clientes.find(c => c.id === s.cliente_id)
  const nomeCli = s.cliente_nome || cli?.nome_dentista || cli?.nome_lab || 'Cliente'
  const numCli = cli?.numero_sequencial || '—'

  let itens_list = ''
  try {
    const itens = JSON.parse(s.itens_json || '[]')
    itens_list = itens.map((item, idx) => {
      let line = `  ${idx + 1}. ${item.tipo} - R$ ${item.valor.toFixed(2)}`
      if (item.desc) line += ` (${item.desc})`
      return line
    }).join('\n')
  } catch(e) {
    itens_list = s.tipo_servico || ''
  }

  const msg = `*SERVIÇO - LABORATÓRIO CAMINI*\n\n` +
    `🔢 Cliente #${numCli}\n` +
    `👤 Consultório: ${nomeCli}\n` +
    `🧑 Paciente: ${s.paciente}\n` +
    `📋 Serviços:\n${itens_list}\n\n` +
    `💰 TOTAL: R$ ${(s.valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}\n` +
    `📅 Entrada: ${new Date(s.data_entrada + 'T12:00:00').toLocaleDateString('pt-BR')}\n` +
    `📅 Saída: ${s.data_saida ? new Date(s.data_saida + 'T12:00:00').toLocaleDateString('pt-BR') : '—'}\n` +
    `✓ Status: ${s.pago ? 'Pago' : 'Pendente'}\n\n` +
    `Laboratório de Prótese Dentária Camini`

  const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`
  window.open(url, '_blank')
}

    </tr>
    ${itens_html}
    <tr style="background: #f5f5f5">
